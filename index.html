<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridzaw Notepad</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#f0f2f5; }
    .header { background:#0066cc; color:white; padding:15px; text-align:center; font-size:20px; position:relative; }
    .container { display:flex; height:calc(100vh - 120px); }
    .editor-area { 
      flex:1; 
      padding:15px; 
      display:flex; 
      flex-direction:column; 
      overflow:hidden;
    }
    .sidebar { width:380px; background:white; border-left:1px solid #ddd; transition:0.4s; }
    .sidebar.minimized { width:55px; }
    
    #editor { 
      flex:1; 
      padding:15px; 
      font-size:17px; 
      border:1px solid #ccc; 
      border-radius:8px; 
      resize:none; 
      direction: ltr !important;
      background:white;
      overflow-y:auto;
      line-height: 1.6;
      min-height:200px;
    }
    
    #editor:focus { outline:none; border-color:#0066cc; }
    
    .date-header { background:#e3f2fd; padding:10px; margin:8px 0; cursor:pointer; font-weight:bold; }
    .history-item { padding:8px 12px; border-bottom:1px solid #eee; font-size:14px; }

    button { padding:10px 14px; margin:4px; border-radius:6px; cursor:pointer; border:1px solid #ddd; }
    .toggle-btn { position:absolute; right:15px; top:12px; font-size:26px; background:none; border:none; color:white; cursor:pointer; }
    
    .toolbar { background:#e8e8e8; padding:12px; border-radius:8px; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:5px; }
    .toolbar button { padding:8px 12px; font-size:14px; }
    .color-btn { width:40px; height:40px; padding:0; margin:4px; border:none; border-radius:4px; cursor:pointer; border:2px solid #999; }

    .button-container { 
      margin-top:10px; 
      display:flex; 
      gap:10px; 
      flex-shrink:0;
    }
    .button-container button { 
      flex:1; 
      margin:0; 
      padding:12px 14px;
    }

    #loginScreen, #nameScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; display:flex; align-items:center; justify-content:center; z-index:9999; }
    #loginScreen.hidden, #nameScreen.hidden { display:none; }
    
    .login-card, .name-card { background:white; padding:40px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1); text-align:center; }
    .login-card h1, .name-card h2 { margin-bottom:20px; }
    .login-card input { padding:12px; width:280px; font-size:17px; margin:10px 0; border:1px solid #ccc; border-radius:6px; }
    .login-card button, .name-card button { padding:12px 30px; margin:10px; font-size:16px; background:#0066cc; color:white; border:none; border-radius:6px; cursor:pointer; }
    
    .calc-tabs { display:flex; gap:10px; margin-bottom:15px; border-bottom:2px solid #ddd; }
    .calc-tab { padding:10px 15px; cursor:pointer; background:none; border:none; font-weight:bold; color:#666; border-bottom:3px solid transparent; }
    .calc-tab.active { color:#0066cc; border-bottom-color:#0066cc; }
    
    .calc-tab-content { display:none; }
    .calc-tab-content.active { display:block; }
    
    #pasteArea { width:100%; height:150px; padding:10px; border:1px solid #ccc; border-radius:5px; font-family:monospace; font-size:14px; resize:vertical; }
    
    .adjustment-container { display:flex; gap:10px; margin-top:15px; align-items:center; flex-wrap: wrap; }
    .adjustment-container input { padding:8px 12px; border:1px solid #ccc; border-radius:5px; font-size:14px; width:100px; }
    .adjustment-container button { padding:8px 14px; margin:0; }

    /* Past Data Section Styles */
    .past-data-section {
      background:white;
      border:1px solid #ddd;
      border-radius:8px;
      margin-top:10px;
      overflow:hidden;
    }

    .past-data-header {
      background:#f5f5f5;
      padding:12px 15px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:bold;
      border-bottom:1px solid #ddd;
      user-select:none;
    }

    .past-data-header:hover {
      background:#efefef;
    }

    .past-data-toggle {
      font-size:18px;
      display:inline-block;
      transition:transform 0.3s;
    }

    .past-data-toggle.collapsed {
      transform:rotate(-90deg);
    }

    .past-data-content {
      padding:15px;
      max-height:300px;
      overflow-y:auto;
      display:block;
    }

    .past-data-content.collapsed {
      display:none;
    }

    #pastDataTextarea {
      width:100%;
      height:250px;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-family:monospace;
      font-size:14px;
      resize:vertical;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="hidden">
    <div class="login-card">
      <h1>🔐 Ridzaw Notepad</h1>
      <p>Enter Password</p>
      <div style="position:relative;">
        <input type="password" id="password" placeholder="Password">
        <span id="eye" style="font-size:22px; cursor:pointer; position:absolute; right:10px; top:10px;">👁</span>
      </div>
      <button onclick="checkPassword()">Login</button>
      <p id="errorMsg" style="color:red; margin-top:10px;"></p>
    </div>
  </div>

  <!-- Name Selection Screen -->
  <div id="nameScreen" class="hidden">
    <div class="name-card">
      <h2>Choose Your Name</h2>
      <button onclick="selectUser('Zawad')">Zawad</button>
      <button onclick="selectUser('Ridwan')">Ridwan</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" style="display:none; height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      Ridzaw Shared Notepad
      <span onclick="toggleSidebar()" class="toggle-btn">☰</span>
    </div>

    <div class="container">
      <div class="editor-area">
        <h3>My Note (<span id="userName"></span>) - <span id="currentDate"></span></h3>
        
        <div class="toolbar">
          <button onclick="insertDate()" style="background:#0066cc; color:white;">📅 Date</button>
          <button onclick="insertSection()" style="background:#0066cc; color:white;">📝 Section</button>
          
          <button class="color-btn" style="background:red;" onclick="applyColor('red')" title="Red"></button>
          <button class="color-btn" style="background:green;" onclick="applyColor('green')" title="Green"></button>
          <button class="color-btn" style="background:blue;" onclick="applyColor('blue')" title="Blue"></button>
          <button class="color-btn" style="background:orange;" onclick="applyColor('orange')" title="Orange"></button>
          <button class="color-btn" style="background:black;" onclick="applyColor('black')" title="Black"></button>
          <button class="color-btn" style="background:gray;" onclick="applyColor('black');" title="Remove Color"></button>
          
          <button onclick="applyBold()" style="background:#0066cc; color:white; font-weight:bold;">B</button>
          <button onclick="applyItalic()" style="background:#0066cc; color:white; font-style:italic;">I</button>
          <button onclick="removeFormat()" style="background:#cc0000; color:white;">Clear Format</button>
        </div>

        <div id="editor" contenteditable="true" placeholder="Start typing..."></div>
        
        <!-- Past Data Section -->
        <div class="past-data-section">
          <div class="past-data-header" onclick="togglePastData()">
            <span class="past-data-toggle">▼</span>
            <span>📋 Past Data</span>
          </div>
          <div class="past-data-content" id="pastDataContent">
            <textarea id="pastDataTextarea" placeholder="Manually enter text here (like in the notepad)..."></textarea>
          </div>
        </div>
        
        <div class="button-container">
          <button onclick="showCompare()">🔄 Compare Notes</button>
          <button onclick="showCalculator()">🧮 Calculator</button>
        </div>
      </div>

      <div class="sidebar" id="sidebar">
        <h3 style="padding:12px; border-bottom:1px solid #ddd;">📜 History</h3>
        <div id="historyList" style="padding:5px; overflow-y:auto; height:calc(100% - 50px);"></div>
      </div>
    </div>
  </div>

  <!-- Compare Modal -->
  <div id="compareModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:15px;">
    <div style="background:white; max-width:1100px; margin:auto; border-radius:10px; padding:20px; height:90vh; overflow-y:auto;">
      <h2>📊 Notes Comparison</h2>
      <button onclick="hideCompare()" style="float:right; background:#cc0000; color:white; padding:8px 16px;">Close</button><br><br>
      <table style="width:100%; border-collapse:collapse;">
        <tr style="background:#f0f0f0;">
          <th style="padding:10px; border:1px solid #ddd;">Zawad's Note</th>
          <th style="padding:10px; border:1px solid #ddd;">Ridwan's Note</th>
        </tr>
        <tr>
          <td style="padding:10px; border:1px solid #ddd; vertical-align:top;"><div id="zawadText" style="min-height:400px; background:#f9f9f9; padding:10px;"></div></td>
          <td style="padding:10px; border:1px solid #ddd; vertical-align:top;"><div id="ridwanText" style="min-height:400px; background:#f9f9f9; padding:10px;"></div></td>
        </tr>
      </table>
    </div>
  </div>

  <!-- Calculator Modal -->
  <div id="calcModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:15px; overflow-y:auto;">
    <div style="background:white; max-width:700px; margin:auto; border-radius:10px; padding:20px; max-height:90vh; overflow-y:auto; display:flex; flex-direction:column;">
      <h2>🧮 Calculator</h2>
      <button onclick="hideCalculator()" style="float:right;">Close</button><br><br>

      <div class="calc-tabs">
        <button class="calc-tab active" onclick="switchCalcTab('date')">📅 Date Range</button>
        <button class="calc-tab" onclick="switchCalcTab('paste')">📋 Paste & Calculate</button>
      </div>

      <!-- Date Range Tab -->
      <div id="dateTab" class="calc-tab-content active">
        <label>From Date:</label><br>
        <input type="date" id="fromDate" style="width:100%; padding:10px; margin:8px 0; box-sizing:border-box;"><br>

        <label>To Date:</label><br>
        <input type="date" id="toDate" style="width:100%; padding:10px; margin:8px 0; box-sizing:border-box;">

        <button onclick="autoCalculate()" style="background:#0066cc; color:white; width:100%; padding:12px; margin-top:15px;">Calculate from Date Range</button>
        
        <div id="calcResult" style="margin-top:20px; font-size:18px; line-height:1.8; overflow-y:auto; flex:1; padding:10px; background:#f9f9f9; border-radius:5px;"></div>
      </div>

      <!-- Paste & Calculate Tab -->
      <div id="pasteTab" class="calc-tab-content">
        <label>Paste your text here (format: "item: amount" or "item - amount" or "item: 0.79 + 5 - 10/2"):</label><br>
        <textarea id="pasteArea" placeholder="Example:&#10;Coffee: 50&#10;Lunch - 150&#10;Transport 30&#10;Sakil: 0.79 + 5 - 10/2"></textarea>

        <button onclick="calculateFromPaste()" style="background:#0066cc; color:white; width:100%; padding:12px; margin-top:15px;">Calculate from Pasted Text</button>
        
        <div id="pasteResult" style="margin-top:20px; font-size:18px; line-height:1.8; overflow-y:auto; flex:1; padding:10px; background:#f9f9f9; border-radius:5px;"></div>

        <!-- Global Adjustment Controls -->
        <div class="adjustment-container" style="margin-top:15px; border-top:2px solid #ddd; padding-top:15px;">
          <button onclick="adjustTotal(-5)" style="background:#ff6b6b; color:white;">➖ -5</button>
          <button onclick="adjustTotal(-1)" style="background:#ff8787; color:white;">➖ -1</button>
          <input type="number" id="customAmount" placeholder="Custom amount" step="0.01">
          <button onclick="adjustCustom()" style="background:#0066cc; color:white;">Add</button>
          <button onclick="adjustTotal(1)" style="background:#69db7c; color:white;">➕ +1</button>
          <button onclick="adjustTotal(5)" style="background:#51cf66; color:white;">➕ +5</button>
          <button onclick="resetCalculation()" style="background:#868e96; color:white;">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB3GszelDwALapumE7ubEuskHuKpVeTLnE",
      authDomain: "shared-notepad-665f3.firebaseapp.com",
      databaseURL: "https://shared-notepad-665f3-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shared-notepad-665f3",
      storageBucket: "shared-notepad-665f3.firebasestorage.app",
      messagingSenderId: "870772585147",
      appId: "1:870772585147:web:76e7dd52e4db3e3261af9e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let currentIP = "Unknown";
    let isLoggedIn = false;
    let isLoading = false;
    let isUserTyping = false;
    let currentGrandTotal = 0;
    let originalGrandTotal = 0;
    let isPastDataCollapsed = true;

    function updateCurrentDate() {
      const options = { weekday:'short', month:'short', day:'numeric', year:'numeric' };
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', options);
    }

    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => currentIP = d.ip).catch(() => {});

    document.getElementById('eye').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === "password" ? "text" : "password";
      this.textContent = pwd.type === "password" ? "👁" : "🙈";
    });

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const pass = document.getElementById('password').value.trim();
      if (pass === "9876543210") {
        isLoggedIn = true;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('nameScreen').classList.remove('hidden');
      } else if (pass === "zawad0001") {
        if (confirm("Reset History?")) db.ref('history').remove();
      } else {
        document.getElementById('errorMsg').innerHTML = "❌ Wrong Password!";
      }
    }

    function selectUser(name) {
      if (isLoading) return;
      isLoading = true;
      
      currentUser = name;
      document.getElementById('nameScreen').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('userName').textContent = name;
      updateCurrentDate();
      
      loadNote();
      isLoading = false;
    }

    function loadNote() {
      const editor = document.getElementById('editor');
      db.ref('notes/' + currentUser).on('value', (snap) => {
        if (!isUserTyping && snap.val()) {
          editor.innerHTML = snap.val().html || '';
        } else if (!isUserTyping && !snap.val()) {
          editor.innerHTML = '';
        }
      });

      db.ref('history').orderByChild('timestamp').limitToLast(200).on('value', (snapshot) => {
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        let lastDate = '';
        snapshot.forEach(child => {
          const h = child.val();
          const dateStr = new Date(h.timestamp).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
          if (dateStr !== lastDate) {
            lastDate = dateStr;
            const header = document.createElement('div');
            header.className = 'date-header';
            header.textContent = dateStr;
            container.appendChild(header);
          }
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `<strong>${h.user}</strong> (${h.ip || 'Unknown'})<br><small>${new Date(h.timestamp).toLocaleTimeString()}</small>`;
          container.appendChild(item);
        });
      });
    }

    let saveTimeout;
    const editor = document.getElementById('editor');

    editor.addEventListener('input', () => {
      isUserTyping = true;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        const html = editor.innerHTML;
        db.ref('notes/' + currentUser).set({
          html: html,
          lastEditedBy: currentUser,
          lastEditedAt: Date.now()
        });

        db.ref('history').push({
          user: currentUser,
          ip: currentIP,
          action: "Edited note",
          timestamp: Date.now()
        });

        isUserTyping = false;
      }, 500);
    });

    editor.addEventListener('blur', () => {
      isUserTyping = false;
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('minimized');
    }

    function togglePastData() {
      const content = document.getElementById('pastDataContent');
      const toggle = document.querySelector('.past-data-toggle');
      
      isPastDataCollapsed = !isPastDataCollapsed;
      
      if (isPastDataCollapsed) {
        content.classList.add('collapsed');
        toggle.classList.add('collapsed');
      } else {
        content.classList.remove('collapsed');
        toggle.classList.remove('collapsed');
      }
    }

    function insertDate() {
      const editor = document.getElementById('editor');
      const date = new Date().toLocaleDateString('en-US');
      editor.focus();
      document.execCommand('insertText', false, date + '\n');
    }

    function insertSection() {
      const editor = document.getElementById('editor');
      const date = new Date().toLocaleDateString('en-US');
      editor.focus();
      document.execCommand('insertText', false, `--- ${date} Section ---\n`);
    }

    function applyColor(color) {
      const selection = window.getSelection();
      if (selection.toString().length === 0) {
        alert("Please select text first!");
        return;
      }
      document.execCommand('foreColor', false, color);
    }

    function applyBold() {
      document.execCommand('bold', false, null);
    }

    function applyItalic() {
      document.execCommand('italic', false, null);
    }

    function removeFormat() {
      document.execCommand('removeFormat', false, null);
    }

    function showCompare() {
      document.getElementById('compareModal').style.display = 'block';
      db.ref('notes/Zawad').once('value', s => {
        if (s.val()) {
          document.getElementById('zawadText').innerHTML = s.val().html || "(Empty)";
        } else {
          document.getElementById('zawadText').innerHTML = "(Empty)";
        }
      });
      db.ref('notes/Ridwan').once('value', s => {
        if (s.val()) {
          document.getElementById('ridwanText').innerHTML = s.val().html || "(Empty)";
        } else {
          document.getElementById('ridwanText').innerHTML = "(Empty)";
        }
      });
    }

    function hideCompare() {
      document.getElementById('compareModal').style.display = 'none';
    }

    function showCalculator() {
      document.getElementById('calcModal').style.display = 'block';
    }

    function hideCalculator() {
      document.getElementById('calcModal').style.display = 'none';
    }

    function switchCalcTab(tab) {
      const tabs = document.querySelectorAll('.calc-tab');
      const contents = document.querySelectorAll('.calc-tab-content');
      
      tabs.forEach(t => t.classList.remove('active'));
      contents.forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      
      if (tab === 'date') {
        document.getElementById('dateTab').classList.add('active');
      } else {
        document.getElementById('pasteTab').classList.add('active');
      }
    }

    function autoCalculate() {
      const resultDiv = document.getElementById('calcResult');
      resultDiv.innerHTML = "Reading data...";

      db.ref('notes').once('value', (snap) => {
        const data = snap.val() || {};
        let summary = {};

        Object.keys(data).forEach(user => {
          const html = data[user].html || "";
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = html;
          const text = tempDiv.textContent || tempDiv.innerText || "";
          
          const lines = text.split('\n');
          lines.forEach(line => {
            const parsed = parseItemWithExpression(line);
            if (parsed) {
              summary[parsed.name] = (summary[parsed.name] || 0) + parsed.value;
            }
          });
        });

        let html = `<strong>Calculation Result:</strong><br><br>`;
        let grandTotal = 0;

        if (Object.keys(summary).length === 0) {
          html += `<span style="color:red;">No data found. Make sure entries follow format: "item: amount" or "item - amount" or "item: 0.79 + 5 - 10/2"</span>`;
        } else {
          Object.keys(summary).sort().forEach(name => {
            html += `<strong>${name}:</strong> ${summary[name].toFixed(2)}<br>`;
            grandTotal += summary[name];
          });

          html += `<br><b style="font-size:18px; color:#0066cc;">Grand Total = ${grandTotal.toFixed(2)}</b><br>`;
          html += `<b style="font-size:18px; color:#0066cc;">Total ÷ 2 = ${(grandTotal / 2).toFixed(2)}</b>`;
        }

        resultDiv.innerHTML = html;
      });
    }

    // Safe expression evaluator for mathematical expressions
    function safeEval(expression) {
      // Remove whitespace
      expression = expression.replace(/\s/g, '');
      
      // Validate expression contains only numbers, operators, and parentheses
      if (!/^[\d+\-*/().,]+$/.test(expression)) {
        throw new Error("Invalid characters in expression");
      }
      
      try {
        // Use Function constructor instead of eval for safer evaluation
        const result = Function('"use strict"; return (' + expression + ')')();
        return result;
      } catch (e) {
        throw new Error("Invalid mathematical expression: " + e.message);
      }
    }

    // Parse individual item with support for mathematical expressions
    function parseItemWithExpression(line) {
      // Match: "name: expression" or "name - expression"
      const match = line.match(/^([a-zA-Z\s]+?)[-:]\s*(.+)$/);
      
      if (!match) {
        return null;
      }
      
      const name = match[1].trim().toLowerCase();
      const expression = match[2].trim();
      
      try {
        const value = safeEval(expression);
        if (isNaN(value)) {
          return null;
        }
        return { name, value: parseFloat(value) };
      } catch (e) {
        console.warn(`Error parsing "${line}": ${e.message}`);
        return null;
      }
    }

    function calculateFromPaste() {
      const pasteText = document.getElementById('pasteArea').value;
      const resultDiv = document.getElementById('pasteResult');
      document.getElementById('customAmount').value = '';

      if (!pasteText.trim()) {
        resultDiv.innerHTML = `<span style="color:red;">Please paste some text first!</span>`;
        return;
      }

      let summary = {};
      const lines = pasteText.split('\n').filter(l => l.trim());

      lines.forEach(line => {
        const parsed = parseItemWithExpression(line);
        if (parsed) {
          summary[parsed.name] = (summary[parsed.name] || 0) + parsed.value;
        }
      });

      let html = `<strong>Calculation Result:</strong><br><br>`;
      let grandTotal = 0;

      if (Object.keys(summary).length === 0) {
        html += `<span style="color:red;">No data found. Make sure entries follow format: "item: amount" or "item - amount" or "item: 0.79 + 5 - 10/2"</span>`;
      } else {
        Object.keys(summary).sort().forEach(name => {
          html += `<strong>${name}:</strong> ${summary[name].toFixed(2)}<br>`;
          grandTotal += summary[name];
        });

        html += `<br><b style="font-size:18px; color:#0066cc;">Grand Total = ${grandTotal.toFixed(2)}</b><br>`;
        html += `<b style="font-size:18px; color:#0066cc;">Total ÷ 2 = ${(grandTotal / 2).toFixed(2)}</b>`;
      }

      currentGrandTotal = grandTotal;
      originalGrandTotal = grandTotal;
      resultDiv.innerHTML = html;
    }

    function adjustTotal(amount) {
      currentGrandTotal += amount;
      updatePasteResult();
      document.getElementById('customAmount').value = '';
    }

    function adjustCustom() {
      const customAmount = parseFloat(document.getElementById('customAmount').value);
      if (isNaN(customAmount)) {
        alert("Please enter a valid number");
        return;
      }
      currentGrandTotal += customAmount;
      document.getElementById('customAmount').value = '';
      updatePasteResult();
    }

    function resetCalculation() {
      currentGrandTotal = originalGrandTotal;
      document.getElementById('customAmount').value = '';
      updatePasteResult();
    }

    function updatePasteResult() {
      const resultDiv = document.getElementById('pasteResult');
      let html = `<strong>Calculation Result (Adjusted):</strong><br><br>`;
      
      if (originalGrandTotal === 0) {
        html += `<span style="color:red;">No data found.</span>`;
      } else {
        html += `<b style="font-size:18px; color:#0066cc;">Adjusted Total = ${currentGrandTotal.toFixed(2)}</b><br>`;
        html += `<b style="font-size:18px; color:#0066cc;">Total ÷ 2 = ${(currentGrandTotal / 2).toFixed(2)}</b><br>`;
        if (currentGrandTotal !== originalGrandTotal) {
          const diff = currentGrandTotal - originalGrandTotal;
          const sign = diff > 0 ? '+' : '';
          html += `<small style="color:#666;">Original: ${originalGrandTotal.toFixed(2)} (${sign}${diff.toFixed(2)})</small>`;
        }
      }

      resultDiv.innerHTML = html;
    }

    window.addEventListener('load', () => {
      if (!isLoggedIn) {
        document.getElementById('loginScreen').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
