<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridzaw Notepad</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#f0f2f5; }
    .header { background:#0066cc; color:white; padding:15px; text-align:center; font-size:20px; position:relative; }
    .container { display:flex; height:calc(100vh - 60px); }
    .editor-area { flex:1; padding:15px; display:flex; flex-direction:column; }
    .sidebar { width:380px; background:white; border-left:1px solid #ddd; transition:0.4s; }
    .sidebar.minimized { width:55px; }
    
    #editor { 
      flex:1; 
      padding:15px; 
      font-size:17px; 
      border:1px solid #ccc; 
      border-radius:8px; 
      outline:none; 
      overflow-y:auto;
      background:white;
      min-height:300px;
    }
    #editor:focus { border-color:#0066cc; }

    .toolbar {
      background:#f8f9fa;
      padding:8px;
      border:1px solid #ccc;
      border-radius:6px;
      margin-bottom:8px;
      display:flex;
      flex-wrap:wrap;
      gap:5px;
    }
    .toolbar button, .toolbar select {
      padding:6px 10px;
      font-size:16px;
      cursor:pointer;
    }

    .date-header { 
      background:#e3f2fd; 
      padding:10px; 
      margin:12px 0 4px 0; 
      cursor:pointer; 
      font-weight:bold; 
      border-radius:6px;
      user-select:none;
    }
    .date-content {
      display:block;
      padding-left:15px;
      border-left:3px solid #0066cc;
    }
    .collapsed .date-content { display:none; }

    button { padding:10px 14px; margin:4px; border-radius:6px; cursor:pointer; }
    .toggle-btn { position:absolute; right:15px; top:12px; font-size:26px; background:none; border:none; color:white; cursor:pointer; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen" style="text-align:center; padding:80px 20px;">
    <h1>🔐 Ridzaw Notepad</h1>
    <p>Enter Password</p>
    <input type="password" id="password" placeholder="Password" style="padding:12px; width:280px; font-size:17px;">
    <span id="eye" style="font-size:22px; cursor:pointer; margin-left:-35px;">👁</span>
    <br><br>
    <button onclick="checkPassword()" style="font-size:18px;">Login</button>
    <p id="errorMsg" style="color:red; margin-top:10px;"></p>
  </div>

  <!-- Name Selection -->
  <div id="nameScreen" style="display:none; text-align:center; padding:80px;">
    <h2>Choose Your Name</h2><br>
    <button onclick="selectUser('Zawad')" style="padding:15px 40px; font-size:18px;">Zawad</button>
    <button onclick="selectUser('Ridwan')" style="padding:15px 40px; font-size:18px;">Ridwan</button>
  </div>

  <!-- Main App -->
  <div id="mainApp" style="display:none; height:100vh;">
    <div class="header">
      Ridzaw Shared Notepad
      <span onclick="toggleSidebar()" class="toggle-btn">☰</span>
    </div>

    <div class="container">
      <div class="editor-area">
        <h3>My Note (<span id="userName"></span>)</h3>
        
        <div class="toolbar">
          <button onclick="formatText('bold')" title="Bold"><b>B</b></button>
          <button onclick="formatText('underline')" title="Underline"><u>U</u></button>
          <button onclick="formatText('italic')" title="Italic"><i>I</i></button>
          <button onclick="highlightText()" title="Highlight">🖍</button>
          
          <select onchange="changeTextColor(this.value)">
            <option value="">Text Color</option>
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="orange">Orange</option>
            <option value="purple">Purple</option>
            <option value="black">Black</option>
          </select>

          <button onclick="insertDateSection()" title="Insert Collapsible Date">📅 Date Section</button>
          <button onclick="showCompare()">🔄 Compare</button>
          <button onclick="showCalculator()">🧮 Calculator</button>
        </div>

        <div id="editor" contenteditable="true" placeholder="Type here..."></div>
      </div>

      <div class="sidebar" id="sidebar">
        <h3 style="padding:12px; border-bottom:1px solid #ddd;">📜 History</h3>
        <div id="historyList" style="padding:5px; overflow-y:auto; height:calc(100% - 50px);"></div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="compareModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:15px;">
    <div style="background:white; max-width:1100px; margin:auto; border-radius:10px; padding:20px;">
      <h2>📊 Notes Comparison</h2>
      <button onclick="hideCompare()" style="float:right;">Close</button><br><br>
      <table style="width:100%; border-collapse:collapse;">
        <tr><th>Zawad's Note</th><th>Ridwan's Note</th></tr>
        <tr>
          <td><pre id="zawadText" style="white-space:pre-wrap;"></pre></td>
          <td><pre id="ridwanText" style="white-space:pre-wrap;"></pre></td>
        </tr>
      </table>
    </div>
  </div>

  <div id="calcModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:15px;">
    <div style="background:white; max-width:700px; margin:auto; border-radius:10px; padding:20px;">
      <h2>🧮 Calculator</h2>
      <button onclick="hideCalculator()" style="float:right;">Close</button><br><br>
      <label>From Date:</label><br>
      <input type="date" id="fromDate" style="width:100%; padding:10px; margin:8px 0;"><br>
      <label>To Date:</label><br>
      <input type="date" id="toDate" style="width:100%; padding:10px; margin:8px 0;">
      <button onclick="autoCalculate()" style="background:#0066cc; color:white; width:100%; padding:12px; margin-top:15px;">Calculate from Date Range</button>
      <div id="calcResult" style="margin-top:20px; font-size:18px; line-height:1.8;"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB3GszelDwALapumE7ubEuskHuKpVeTLnE",
      authDomain: "shared-notepad-665f3.firebaseapp.com",
      databaseURL: "https://shared-notepad-665f3-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shared-notepad-665f3",
      storageBucket: "shared-notepad-665f3.firebasestorage.app",
      messagingSenderId: "870772585147",
      appId: "1:870772585147:web:76e7dd52e4db3e3261af9e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let currentIP = "Unknown";
    let saveTimeout = null;

    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => currentIP = d.ip).catch(() => {});

    // Password Eye Toggle
    document.getElementById('eye').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === "password" ? "text" : "password";
      this.textContent = pwd.type === "password" ? "👁" : "🙈";
    });

    function checkPassword() {
      const pass = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.innerHTML = "";

      if (pass === "9876543210") {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('nameScreen').style.display = 'block';
      } 
      else if (pass === "zawad0001") {
        if (confirm("Reset History?")) {
          db.ref('history').remove();
          alert("History Reset Done");
        }
      } 
      else {
        errorMsg.innerHTML = "❌ Wrong Password!";
      }
    }

    function selectUser(name) {
      currentUser = name;
      document.getElementById('nameScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userName').textContent = name;
      loadNote();
    }

    function loadNote() {
      const editor = document.getElementById('editor');
      
      db.ref('notes/' + currentUser).on('value', (snap) => {
        if (snap.val() && snap.val().html) {
          editor.innerHTML = snap.val().html;
        } else {
          editor.innerHTML = '';
        }
      });

      db.ref('history').orderByChild('timestamp').limitToLast(200).on('value', (snapshot) => {
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        let lastDate = '';
        snapshot.forEach(child => {
          const h = child.val();
          const dateStr = new Date(h.timestamp).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
          if (dateStr !== lastDate) {
            lastDate = dateStr;
            const header = document.createElement('div');
            header.className = 'date-header';
            header.textContent = dateStr;
            container.appendChild(header);
          }
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `<strong>${h.user}</strong> (${h.ip || 'Unknown'})<br><small>${new Date(h.timestamp).toLocaleTimeString()}</small>`;
          container.appendChild(item);
        });
      });
    }

    const editor = document.getElementById('editor');
    
    editor.addEventListener('input', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveToFirebase, 800);
    });

    function saveToFirebase() {
      if (!currentUser) return;
      db.ref('notes/' + currentUser).set({
        html: editor.innerHTML,
        lastEditedBy: currentUser,
        lastEditedAt: Date.now()
      });

      db.ref('history').push({
        user: currentUser,
        ip: currentIP,
        action: "Edited note",
        timestamp: Date.now()
      });
    }

    function formatText(command) {
      document.execCommand(command, false, null);
      editor.focus();
    }

    function highlightText() {
      document.execCommand('hiliteColor', false, '#ffff00');
      editor.focus();
    }

    function changeTextColor(color) {
      if (color) document.execCommand('foreColor', false, color);
      editor.focus();
    }

    function insertDateSection() {
      const date = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
      const sectionHTML = `
        <div class="date-header" onclick="this.parentElement.classList.toggle('collapsed')">
          📅 ${date} ▼
        </div>
        <div class="date-content"><p>Type here...</p></div><br>
      `;
      editor.innerHTML += sectionHTML;
      editor.focus();
      saveToFirebase();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('minimized');
    }

    function showCompare() {
      document.getElementById('compareModal').style.display = 'block';
      db.ref('notes/Zawad').once('value', s => {
        document.getElementById('zawadText').textContent = s.val() ? (s.val().html || s.val().text || "(Empty)") : "(Empty)";
      });
      db.ref('notes/Ridwan').once('value', s => {
        document.getElementById('ridwanText').textContent = s.val() ? (s.val().html || s.val().text || "(Empty)") : "(Empty)";
      });
    }

    function hideCompare() { document.getElementById('compareModal').style.display = 'none'; }
    function showCalculator() { document.getElementById('calcModal').style.display = 'block'; }
    function hideCalculator() { document.getElementById('calcModal').style.display = 'none'; }

    function autoCalculate() {
      const resultDiv = document.getElementById('calcResult');
      resultDiv.innerHTML = "Reading data...";

      db.ref('notes').once('value', (snap) => {
        const data = snap.val() || {};
        let summary = {};

        Object.keys(data).forEach(user => {
          let text = "";
          if (data[user].html) {
            const temp = document.createElement('div');
            temp.innerHTML = data[user].html;
            text = temp.textContent || "";
          } else text = data[user].text || "";
          
          const lines = text.split('\n');
          lines.forEach(line => {
            const match = line.match(/(\w+)\s*[-:]\s*(\d+\.?\d*)/i);
            if (match) {
              const name = match[1].trim().toLowerCase();
              const amount = parseFloat(match[2]);
              if (!isNaN(amount)) summary[name] = (summary[name] || 0) + amount;
            }
          });
        });

        let html = `<strong>Calculation Result:</strong><br><br>`;
        let grandTotal = 0;
        Object.keys(summary).sort().forEach(name => {
          html += `${name}: ${summary[name]}<br>`;
          grandTotal += summary[name];
        });

        html += `<br><b>Grand Total = ${grandTotal}</b><br>`;
        html += `<b>Total ÷ 2 = ${(grandTotal / 2).toFixed(2)}</b>`;
        resultDiv.innerHTML = html;
      });
    }
  </script>
</body>
</html>
